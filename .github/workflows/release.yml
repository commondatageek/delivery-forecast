name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required for the release job to create a Release

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "dist/forecast${{ matrix.ext }}" \
            ./cmd/forecast

      - name: Package
        run: |
          NAME="forecast_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cp README.md dist/README.md
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "forecast${{ matrix.ext }}" README.md
          else
            tar -czf "${NAME}.tar.gz" "forecast${{ matrix.ext }}" README.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forecast_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Detect prerelease
        id: prerelease
        run: |
          if echo "${GITHUB_REF_NAME}" | grep -qiE '\-(rc|beta|alpha)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
